<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960" width="540" height="960">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#2a1506"/>
      <stop offset="45%" stop-color="#5c2d0e"/>
      <stop offset="100%" stop-color="#1a0e04"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#c87832" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#c87832" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="24"/></filter>
  </defs>
  <rect width="540" height="960" fill="url(#g)"/>
  <ellipse cx="270" cy="380" rx="260" ry="210" fill="url(#glow)" filter="url(#blur)"/>
  <!-- boho circles / rings -->
  <circle cx="270" cy="400" r="160" fill="none" stroke="#c87832" stroke-width="0.8" opacity="0.18"/>
  <circle cx="270" cy="400" r="120" fill="none" stroke="#e8a860" stroke-width="0.5" opacity="0.14"/>
  <circle cx="270" cy="400" r="85"  fill="none" stroke="#c87832" stroke-width="0.7" opacity="0.16"/>
  <!-- leaf / feather shapes -->
  <ellipse cx="200" cy="260" rx="18" ry="55" fill="#c87832" opacity="0.20" transform="rotate(-20 200 260)"/>
  <ellipse cx="340" cy="270" rx="14" ry="48" fill="#e8a860" opacity="0.18" transform="rotate(18 340 270)"/>
  <ellipse cx="150" cy="420" rx="10" ry="38" fill="#c87832" opacity="0.15" transform="rotate(-35 150 420)"/>
  <ellipse cx="390" cy="430" rx="10" ry="38" fill="#e8a860" opacity="0.16" transform="rotate(28 390 430)"/>
  <!-- brand -->
  <text x="270" y="830" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="600" letter-spacing="4" fill="rgba(255,255,255,0.35)">DAINORA EVENTS</text>
  <text x="270" y="880" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="36" font-weight="900" letter-spacing="-1" fill="white" opacity="0.92">BOHO FESTIVAL</text>
</svg>
