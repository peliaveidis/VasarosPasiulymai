<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960" width="540" height="960">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#061a0a"/>
      <stop offset="50%" stop-color="#0f3318"/>
      <stop offset="100%" stop-color="#040e06"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#28a050" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#28a050" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="22"/></filter>
  </defs>
  <rect width="540" height="960" fill="url(#g)"/>
  <ellipse cx="270" cy="400" rx="250" ry="200" fill="url(#glow)" filter="url(#blur)"/>
  <!-- tree silhouettes -->
  <rect x="60"  y="440" width="18" height="220" fill="#1a4a20" opacity="0.55"/>
  <polygon points="69,200 30,450 108,450" fill="#1a4a20" opacity="0.50"/>
  <polygon points="69,260 22,460 116,460" fill="#1f5526" opacity="0.40"/>
  <rect x="440" y="460" width="16" height="200" fill="#1a4a20" opacity="0.50"/>
  <polygon points="448,220 412,470 484,470" fill="#1a4a20" opacity="0.48"/>
  <polygon points="448,280 405,480 491,480" fill="#1f5526" opacity="0.38"/>
  <!-- ground line -->
  <rect x="0" y="650" width="540" height="4" fill="#28a050" opacity="0.10"/>
  <!-- dots / fireflies -->
  <circle cx="170" cy="370" r="2" fill="#7ee890" opacity="0.45"/>
  <circle cx="350" cy="320" r="1.5" fill="#7ee890" opacity="0.38"/>
  <circle cx="420" cy="400" r="2" fill="#7ee890" opacity="0.30"/>
  <circle cx="120" cy="500" r="1.5" fill="#7ee890" opacity="0.35"/>
  <!-- brand -->
  <text x="270" y="830" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="600" letter-spacing="4" fill="rgba(255,255,255,0.35)">DAINORA EVENTS</text>
  <text x="270" y="872" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="26" font-weight="900" letter-spacing="-0.5" fill="white" opacity="0.92">GIMINIŲ</text>
  <text x="270" y="906" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="26" font-weight="900" letter-spacing="-0.5" fill="white" opacity="0.92">SUSITIKIMAS</text>
</svg>
