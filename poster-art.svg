<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960" width="540" height="960">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#3d1066"/>
      <stop offset="100%" stop-color="#0d0618"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#d41b8a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#d41b8a" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="22"/></filter>
  </defs>
  <rect width="540" height="960" fill="url(#g)"/>
  <ellipse cx="270" cy="420" rx="240" ry="200" fill="url(#glow)" filter="url(#blur)"/>
  <!-- abstract paint strokes -->
  <ellipse cx="160" cy="300" rx="90" ry="30" fill="#d41b8a" opacity="0.18" transform="rotate(-25 160 300)"/>
  <ellipse cx="380" cy="560" rx="110" ry="22" fill="#8b1a6b" opacity="0.22" transform="rotate(15 380 560)"/>
  <ellipse cx="270" cy="460" rx="70" ry="70" fill="#f472b6" opacity="0.10"/>
  <!-- thin lines / brushstrokes -->
  <line x1="80" y1="200" x2="460" y2="680" stroke="#f472b6" stroke-width="1" opacity="0.12"/>
  <line x1="20" y1="500" x2="520" y2="400" stroke="#d41b8a" stroke-width="0.8" opacity="0.14"/>
  <!-- brand mark -->
  <text x="270" y="830" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="600" letter-spacing="4" fill="rgba(255,255,255,0.35)" text-transform="uppercase">DAINORA EVENTS</text>
  <!-- title -->
  <text x="270" y="880" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="38" font-weight="900" letter-spacing="-1" fill="white" opacity="0.92">WE ARE ART</text>
</svg>
